<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="LOGO MASTER-ICON-1.png">
  <link rel="apple-touch-icon" href="LOGO MASTER-ICON-1.png">
  <title>Join Community | R9 International</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Background pattern dengan efek blur */
        body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: linear-gradient(rgba(0,0,0,0.55), rgba(80,0,0,0.55)), url('./bg-r9.png');
        background-size: cover;
        background-position: center;
        filter: blur(4px);
        transform: scale(1.05); /* mencegah pinggir terlihat */
        z-index: -1;
        }
        /* Animasi fade-in saat halaman dibuka */
        @keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-page {
  animation: fadeIn 0.5s ease-out;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255,255,255,0.4);
  animation: ripple-animation 0.6s linear;
  pointer-events: none;
}

@keyframes ripple-animation {
  to {
    transform: scale(4);
    opacity: 0;
  }
}
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black text-white px-4">
    <div id="page-loader"
     class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50">

  <div class="flex flex-col items-center gap-3">
    <div class="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
    <span class="text-sm text-gray-300">Loading...</span>
  </div>

</div>
</body>

  <div class="bg-black/70 backdrop-blur-md rounded-2xl shadow-2xl p-8 animate-page">

<div class="mb-6">
  <img src="LOGO MASTER-ICON-1.png"
       alt="R9 Logo"
       class="w-44 sm:w-52 md:w-64 h-auto mx-auto drop-shadow-2xl" />
</div>
    <!-- Title -->
    <h1 class="text-3xl sm:text-4xl font-extrabold mb-4 tracking-wide">
      JOIN TO OUR COMMUNITY
    </h1>

    <!-- Description -->
    <p class="text-gray-300 mb-8 text-sm">
      Choose your path and contact our recruitment team to become part of the Reign.
    </p>

    <!-- Buttons -->
    <div class="space-y-4">

      <!-- Male -->
      <a id="male-button" href="https://wa.me/62895320375889" target="_blank"
         class="block w-full bg-black hover:bg-green-600 transition duration-150 rounded-2xl py-4 font-semibold shadow-lg text-center transform active:scale-95 relative overflow-hidden active:shadow-inner hover:scale-105 hover:shadow-green-500/50 hover:shadow-2xl ripple-btn">
        <span class="flex items-center justify-center gap-2">
        <i class="fab fa-whatsapp text-green-400"></i>
        <span class="btn-text">JOIN VIA WHATSAPP (MALE)</span>
        <span class="spinner hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        </span>
      </a>

      <!-- Female -->
      <a id="female-button" href="https://wa.me/6285211136421" target="_blank"
         class="block w-full bg-black hover:bg-pink-600 transition duration-150 rounded-2xl py-4 font-semibold shadow-lg text-center transform active:scale-95 relative overflow-hidden active:shadow-inner hover:scale-105 hover:shadow-pink-500/50 hover:shadow-2xl ripple-btn">
        <span class="flex items-center justify-center gap-2">
        <i class="fab fa-whatsapp text-green-400"></i>
        <span class="btn-text">JOIN VIA WHATSAPP (FEMALE)</span>
        <span class="spinner hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        </span>
      </a>

    </div>

    <!-- Back Button -->
    <div class="mt-8">
        <a href="/"
        class="ripple-btn relative overflow-hidden inline-block bg-black hover:bg-red-700 transition duration-150 rounded-2xl px-6 py-3 font-semibold shadow-lg transform active:scale-95">
        ← Back to Lobby
        </a>
    </div>

  </div>

  <script>
    document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    const body = document.body;

    body.style.opacity = "0";
    body.style.transition = "opacity 0.25s ease";

    setTimeout(() => {
      window.location = this.href;
    }, 250);

    e.preventDefault();
  });
});

function setupButtonLoading(buttonId) {
  const button = document.getElementById(buttonId);

  if (!button) return;

  button.addEventListener("click", function() {
    const text = button.querySelector(".btn-text");
    const spinner = button.querySelector(".spinner");

    if (!text || !spinner) return;

    // Simpan teks asli
    const originalText = text.textContent;

    // Lock tombol
    button.style.pointerEvents = "none";
    button.style.opacity = "0.7";

    // Ubah tampilan
    text.textContent = "Opening...";
    spinner.classList.remove("hidden");

    setTimeout(() => {
      // Kembalikan normal
      button.style.pointerEvents = "auto";
      button.style.opacity = "1";

      text.textContent = originalText;
      spinner.classList.add("hidden");
    }, 4000);
  });
}
document.querySelectorAll('.ripple-btn').forEach(button => {
  button.addEventListener('click', function(e) {

    const circle = document.createElement('span');
    circle.classList.add('ripple');

    const rect = button.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);

    circle.style.width = size + 'px';
    circle.style.height = size + 'px';

    circle.style.left = e.clientX - rect.left - size / 2 + 'px';
    circle.style.top = e.clientY - rect.top - size / 2 + 'px';

    button.appendChild(circle);

    setTimeout(() => {
      circle.remove();
    }, 600);

  });
});

const loader = document.getElementById("page-loader");

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {

    // hanya untuk link internal
    if (this.target === "_blank") return;

    e.preventDefault();

    loader.classList.remove("hidden");

    document.body.style.opacity = "0";
    document.body.style.transition = "opacity 0.25s ease";

    setTimeout(() => {
      window.location.href = this.href;
    }, 300);

  });
});

setupButtonLoading("male-button");
setupButtonLoading("female-button");
  </script>

</body>
</html>
