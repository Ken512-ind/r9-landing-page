<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="LOGO MASTER-ICON-1.png">
  <link rel="apple-touch-icon" href="LOGO MASTER-ICON-1.png">
  <title>Team Roster | R9 International</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(
        rgba(0,0,0,0.55),
        rgba(80,0,0,0.55)
      ), url('./bg-r9.png');
      background-size: cover;
      background-position: center;
      filter: blur(4px);
      transform: scale(1.05);
      z-index: -1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-page {
      animation: fadeIn 0.6s ease-out;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-transparent text-white px-4">

  <div class="w-full max-w-xl text-center px-6 py-10 bg-black/60 backdrop-blur-md rounded-2xl shadow-2xl animate-page">

    <!-- Logo -->
    <div class="mb-6">
      <img src="LOGO MASTER-ICON-1.png"
           alt="R9 Logo"
           class="w-44 sm:w-52 md:w-64 h-auto mx-auto drop-shadow-2xl" />
    </div>

    <!-- Title -->
    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-wide mb-4">
      TEAM ROSTER
    </h1>

    <!-- Coming Soon Text -->
    <p class="text-lg text-gray-300 mb-8">
      Coming Soon
    </p>

    <p class="text-sm text-gray-400 mb-10">
      Our competitive lineup is currently being prepared. Stay tuned for updates.
    </p>

    <!-- Back Button -->
    <a href="index.html"
       class="inline-block bg-black hover:bg-red-700 transition duration-150 rounded-2xl px-6 py-3 font-semibold shadow-lg transform active:scale-95">
      ← Back to Lobby
    </a>

  </div>

</body>
</html>
